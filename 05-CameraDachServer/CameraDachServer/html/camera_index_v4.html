<!-- Основная страница сервера, управляющая работой камеры ESP32-CAM -->
<!doctype html>
<html lang="ru">
<head>
  <meta http-equiv="content-type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Видеопоток ESP32-CAM c OV2640</title>
  
<style>
body {
  font-family: Arial,Helvetica,sans-serif;
  background: #181818;
  color: #EFEFEF;
  font-size: 16px
}

h2 {
  font-size: 18px
}

section.main {
  display: flex
}

#menu,section.main {
  flex-direction: column
}

#menu {
  display: none;
  flex-wrap: nowrap;
  min-width: 340px;
  background: #363636;
  padding: 8px;
  border-radius: 4px;
  margin-top: -10px;
  margin-right: 10px;
}

#content {
  display: flex;
  flex-wrap: wrap;
  align-items: stretch
}

figure {
  padding: 0px;
  margin: 0;
  -webkit-margin-before: 0;
  margin-block-start: 0;
  -webkit-margin-after: 0;
  margin-block-end: 0;
  -webkit-margin-start: 0;
  margin-inline-start: 0;
  -webkit-margin-end: 0;
  margin-inline-end: 0
  background: yellow;
}

figure img {
  display: block;
  width: 100%;
  height: auto;
  border-radius: 4px;
  margin-top: 8px;
}

@media (min-width: 800px) and (orientation:landscape) {
  #content {
    display:flex;
    flex-wrap: nowrap;
    align-items: stretch
  }

  figure img {
    display: block;
    max-width: 100%;
    max-height: calc(100vh - 40px);
    width: auto;
    height: auto
  }

  figure {
    padding: 0 0 0 0px;
    margin: 0;
    -webkit-margin-before: 0;
    margin-block-start: 0;
    -webkit-margin-after: 0;
    margin-block-end: 0;
    -webkit-margin-start: 0;
    margin-inline-start: 0;
    -webkit-margin-end: 0;
    margin-inline-end: 0
    background: red;
  }
}

section#buttons {
  display: flex;
  flex-wrap: nowrap;
  justify-content: space-between
}

#nav-toggle {
  cursor: pointer;
  display: block
}

#nav-toggle-cb {
  outline: 0;
  opacity: 0;
  width: 0;
  height: 0
}

#nav-toggle-cb:checked+#menu {
  display: flex
}

.input-group {
  display: flex;
  flex-wrap: nowrap;
  line-height: 22px;
  margin: 5px 0
}

.input-group>label {
  display: inline-block;
  padding-right: 10px;
  min-width: 47%
}

.input-group input,.input-group select {
  flex-grow: 1
}

.range-max,.range-min {
  display: inline-block;
  padding: 0 5px
}

button, .button {
  display: block;
  margin: 5px;
  padding: 0 12px;
  border: 0;
  line-height: 28px;
  cursor: pointer;
  color: #fff;
  background: #ff3034;
  border-radius: 5px;
  font-size: 16px;
  outline: 0
}

.save {
  position: absolute;
  right: 25px;
  top: 0px;
  height: 16px;
  line-height: 16px;
  padding: 0 4px;
  text-decoration: none;
  cursor: pointer
}

button:hover {
  background: #ff494d
}

button:active {
  background: #f21c21
}

button.disabled {
  cursor: default;
background: #a0a0a0
}

input[type=range] {
  -webkit-appearance: none;
  width: 100%;
  height: 22px;
  background: #363636;
  cursor: pointer;
  margin: 0
}

input[type=range]:focus {
  outline: 0
}

input[type=range]::-webkit-slider-runnable-track {
  width: 100%;
  height: 2px;
  cursor: pointer;
  background: #EFEFEF;
  border-radius: 0;
  border: 0 solid #EFEFEF
}

input[type=range]::-webkit-slider-thumb {
  border: 1px solid rgba(0,0,30,0);
  height: 22px;
  width: 22px;
  border-radius: 50px;
  background: #ff3034;
  cursor: pointer;
  -webkit-appearance: none;
  margin-top: -11.5px
}

input[type=range]:focus::-webkit-slider-runnable-track {
  background: #EFEFEF
}

input[type=range]::-moz-range-track {
  width: 100%;
  height: 2px;
  cursor: pointer;
  background: #EFEFEF;
  border-radius: 0;
  border: 0 solid #EFEFEF
}

            input[type=range]::-moz-range-thumb {
                border: 1px solid rgba(0,0,30,0);
                height: 22px;
                width: 22px;
                border-radius: 50px;
                background: #ff3034;
                cursor: pointer
            }

            input[type=range]::-ms-track {
                width: 100%;
                height: 2px;
                cursor: pointer;
                background: 0 0;
                border-color: transparent;
                color: transparent
            }

            input[type=range]::-ms-fill-lower {
                background: #EFEFEF;
                border: 0 solid #EFEFEF;
                border-radius: 0
            }

            input[type=range]::-ms-fill-upper {
                background: #EFEFEF;
                border: 0 solid #EFEFEF;
                border-radius: 0
            }

            input[type=range]::-ms-thumb {
                border: 1px solid rgba(0,0,30,0);
                height: 22px;
                width: 22px;
                border-radius: 50px;
                background: #ff3034;
                cursor: pointer;
                height: 2px
            }

            input[type=range]:focus::-ms-fill-lower {
                background: #EFEFEF
            }

            input[type=range]:focus::-ms-fill-upper {
                background: #363636
            }

            .switch {
                display: block;
                position: relative;
                line-height: 22px;
                font-size: 16px;
                height: 22px
            }

            .switch input {
                outline: 0;
                opacity: 0;
                width: 0;
                height: 0
            }

            .slider {
                width: 50px;
                height: 22px;
                border-radius: 22px;
                cursor: pointer;
                background-color: grey
            }

            .slider,.slider:before {
                display: inline-block;
                transition: .4s
            }

            .slider:before {
                position: relative;
                content: "";
                border-radius: 50%;
                height: 16px;
                width: 16px;
                left: 4px;
                top: 3px;
                background-color: #fff
            }

            input:checked+.slider {
                background-color: #ff3034
            }

            input:checked+.slider:before {
                -webkit-transform: translateX(26px);
                transform: translateX(26px)
            }

            select {
                border: 1px solid #363636;
                font-size: 14px;
                height: 22px;
                outline: 0;
                border-radius: 5px
            }

            .image-container {
                position: relative;
                min-width: 160px
            }

            .close {
                position: absolute;
                right: 5px;
                top: 5px;
                background: #ff3034;
                width: 16px;
                height: 16px;
                border-radius: 100px;
                color: #fff;
                text-align: center;
                line-height: 18px;
                cursor: pointer
            }

.hidden 
{
  display: none
}

input[type=text] {
  border: 1px solid #363636;
  font-size: 14px;
  height: 20px;
  margin: 1px;
  outline: 0;
  border-radius: 5px
}

.inline-button {
  line-height: 20px;
  margin: 2px;
  padding: 1px 4px 2px 4px;
}

label.toggle-section-label {
  cursor: pointer;
  display: block
}

input.toggle-section-button {
  outline: 0;
  opacity: 0;
  width: 0;
  height: 0
}

input.toggle-section-button:checked+section.toggle-section {
  display: none
}

/* 2026-02-28 */
.toggle-section {
  display: none
}
.toggle-section-label
{
  display: none
}
/* 2026-03-11  "aec-group", "aec2-group", "aec_value-group" в CSS делаем невидимыми */
#aec-group, #aec2-group,     #aec_value-group   {display:none}
#agc-group, #agc_gain-group, #gainceiling-group {display:none}

/* ***xclk***=8, "set-xclk-group" в CSS делаем невидимым */
#set-xclk-group {display:none}
</style>
</head>

<script>
document.addEventListener('DOMContentLoaded', function (event) 
{
  console.log("Информация по главной странице сервера");
  var myLocal = document.location;
  console.log("Полный URL страницы:   "+myLocal.href);
  console.log("Доменное имя и порт:   "+myLocal.host);

  var baseHost = document.location.origin
  var streamUrl = baseHost + ':81'
  console.log("baseHost:"+baseHost);

  // ---
  // Оттрасстировать запрос на сервер
  // ---
  function ut(iurl,istatus,itext)
  {
    let is=true;
    if (is)
    {
      console.log('url:    ',iurl);
      console.log('status: ',istatus);
      console.log('text:   ',itext);
      console.log(' ');
    }
  }
  // ---
  // Отправить запрос на сервер, а затем в функцию передать статус ответа и текст ответа
  // ---
  function fetchUrl(url, cb)
  {
    fetch(url).
    then(function (response) 
    {
      if (response.status !== 200) 
      {
        cb(response.status, response.statusText);
        ut(url,response.status,response.statusText);
      } 
      else 
      {
        response.text().
        then(function(data)
        {
          cb(200, data);
          ut(url,200,data);
        }).
        catch(function(err) 
        {
          console.log(1113);
          cb(-1, err);
          ut(url,-1,err);
        });
      }
    }).
    catch(function(err) 
    {
      console.log(1114);
      cb(-1, err);
      ut(url,-1,err);
    });
  }

  function setReg(reg, offset, mask, value, cb)
  {
    //console.log('Set Reg', '0x'+reg.toString(16), offset, '0x'+mask.toString(16), '0x'+value.toString(16), '('+value+')');
    value = (value & mask) << offset;
    mask = mask << offset;
    fetchUrl(`${baseHost}/reg?reg=${reg}&mask=${mask}&val=${value}`, cb);
  }

  function getReg(reg, offset, mask, cb){
    mask = mask << offset;
    fetchUrl(`${baseHost}/greg?reg=${reg}&mask=${mask}`, function(code, txt){
      let value = 0;
      if(code == 200)
      {
        value = parseInt(txt);
        value = (value & mask) >> offset;
        txt = ''+value;
      }
      cb(code, txt);
    });
  }
  // ***xclk***=6, запускаем страницу на изменение частоты входного тактового сигнала
  /*
  function setXclk(xclk, cb)
  {
    fetchUrl(`${baseHost}/xclk?xclk=${xclk}`, cb);
  }
  */
  
  // ***xclk***=5, отрабатываем клик на изменение частоты входного тактового сигнала
  // в Мгц на странице управления камерой
  /*
  const setXclkButton = document.getElementById('set-xclk')
  setXclkButton.onclick = () => 
  {
    let xclk = parseInt(document.getElementById('xclk').value);

    setXclk(xclk, function(code, txt)
    {
      if(code != 200)
      {
        alert('Error['+code+']: '+txt);
      }
    });
  }
  */

  const setRegValue = (el) => 
  {
    let reg = el.attributes.reg?parseInt(el.attributes.reg.nodeValue):0;
    let offset = el.attributes.offset?parseInt(el.attributes.offset.nodeValue):0;
    let mask = el.attributes.mask?parseInt(el.attributes.mask.nodeValue):255;
    let value = 0;
    switch (el.type) 
    {
      case 'checkbox':
        value = el.checked ? mask : 0;
        break;
      case 'range':
      case 'text':
      case 'select-one':
        value = el.value;
        break
      default:
        return;
    }
    setReg(reg, offset, mask, value, function(code, txt)
    {
      if(code != 200)
      {
        alert('Error['+code+']: '+txt);
      }
    });
  }

  const updateRegValue = (el, value, updateRemote) => {
    let initialValue;
    let offset = el.attributes.offset?parseInt(el.attributes.offset.nodeValue):0;
    let mask = (el.attributes.mask?parseInt(el.attributes.mask.nodeValue):255) << offset;
    value = (value & mask) >> offset;
    if (el.type === 'checkbox') {
      initialValue = el.checked
      value = !!value
      el.checked = value
    } else {
      initialValue = el.value
      el.value = value
    }
  }

  const printReg = (el) => {
    let reg = el.attributes.reg?parseInt(el.attributes.reg.nodeValue):0;
    let offset = el.attributes.offset?parseInt(el.attributes.offset.nodeValue):0;
    let mask = el.attributes.mask?parseInt(el.attributes.mask.nodeValue):255;
    let value = 0;
    switch (el.type) {
      case 'checkbox':
        value = el.checked ? mask : 0;
        break;
      case 'range':
      case 'select-one':
        value = el.value;
        break
      default:
        return;
    }
    value = (value & mask) << offset;
    return '0x'+reg.toString(16)+', 0x'+value.toString(16);
  }

  const hide = el => {
    el.classList.add('hidden')
  }
  const show = el => 
  {
    el.classList.remove('hidden');
  }

  const disable = el => {
    el.classList.add('disabled')
    el.disabled = true
  }

  const enable = el => {
    el.classList.remove('disabled')
    el.disabled = false
  }
  // ---
  // Заменить значения в html-строках
  // ---
  const updateValue = (el, value, updateRemote) => 
  {
    // Меняем умалчиваемое значение updateRemote="true" на заданное (как правило ""false")
    updateRemote = updateRemote == null ? true : updateRemote;
    let initialValue;
    // Для элементов, типа checkbox меняем на противоположное
    if (el.type === 'checkbox') 
    {
      initialValue = el.checked
      value = !!value
      el.checked = value
    } 
    // Для остальных меняем на заданное
    else 
    {
      initialValue = el.value
      el.value = value
    }
    // Если поступила команда на обновление значений в памяти через страницу
    // сервера "/control" (updateRemote=true), то делаем это
    if (updateRemote && initialValue !== value) 
    {
      updateConfig(el);
    }
  }
  // ---
  // Если поступила команда на обновление значений в памяти через страницу
  // сервера "/control" (updateRemote=true), то выполнить запрос на обновление
  // ---
  function updateConfig (el) 
  {
    let value
    switch (el.type) 
    {
      case 'checkbox':
        value = el.checked ? 1 : 0
        break
      case 'range':
      case 'select-one':
        value = el.value
        break
      case 'button':
      case 'submit':
        value = '1'
        break
      default:
        return
    }
    // Готовим запрос
    const query = `${baseHost}/control?var=${el.id}&val=${value}`
    // Выполняем запрос
    fetch(query)
    .then(response => 
    {
      console.log(`request to ${query} finished, status: ${response.status}`)
    })
  }
  // Закрываем html-элементы класса "close"
  document
  .querySelectorAll('.close')
  .forEach(el => 
  {
    el.onclick = () => 
    {
      hide(el.parentNode)
    }
  })
  // Отправляем запрос параметров камеры (потока изображений) на сервер, 
  // а затем, после получения их в виде json-строки обновляем значения
  // html-текста на экране управления в главной странице
  fetch(`${baseHost}/status`)
  .then(function (response) 
  {
    console.log("Параметры потока изображений: ");
    return response.json();
  })
  .then(function (state) 
  {
    // Перебираем html-строки класса "default-action"
    document
    .querySelectorAll('.default-action')
    // Находим соответствия, выбираем значения из json-строки и заменяем  
    // значения в html-строках класса "default-action" на выбранные
    // (третий параметр updateValue = false, это значит не нужно запускать
    // страницу сервера "/control" для обновления значений в памяти,
    // так как только-что значения выбрали)
    .forEach(el => 
    {
      // Трассируем параметры по освещенности
      if ((el.id=="agc")||(el.id=="agc_gain")||(el.id=="gainceiling"))
      {
        elConsole(el,el.id,state[el.id])
      }
      updateValue(el, state[el.id], false);
    })
  })
  // Вывести информацию по элементу
  function elConsole(el,elid,stateelid)
  {
    //console.log("el:");
    //console.log(el);
    console.log("el.id:",elid,"state[el.id] =",stateelid);
    //console.log(" ");
  }  
  // Выбираем элементы главной страницы
  const view = document.getElementById('stream')
  const viewContainer = document.getElementById('stream-container')
  const stillButton = document.getElementById('get-still')
  const streamButton = document.getElementById('toggle-stream')
  const closeButton = document.getElementById('close-stream')
  const saveButton = document.getElementById('save-still')
  const ledGroup = document.getElementById('led-group')

  const stopStream = () => 
  {
    window.stop();
    streamButton.innerHTML = 'Включить поток'
  }

  const startStream = () => 
  {
    view.src = `${streamUrl}/stream`
    show(viewContainer)
    streamButton.innerHTML = 'Остановить поток'
  }

  // Attach actions to buttons
  stillButton.onclick = () => {
    stopStream()
    view.src = `${baseHost}/capture?_cb=${Date.now()}`
    show(viewContainer)
  }

  closeButton.onclick = () => 
  {
    stopStream()
    hide(viewContainer)
  }

  streamButton.onclick = () => 
  {
    const streamEnabled = streamButton.innerHTML === 'Остановить поток'
    if (streamEnabled) 
    {
      stopStream()
    } 
    else 
    {
      startStream()
    }
  }

  saveButton.onclick = () => {
    var canvas = document.createElement("canvas");
    canvas.width = view.width;
    canvas.height = view.height;
    document.body.appendChild(canvas);
    var context = canvas.getContext('2d');
    context.drawImage(view,0,0);
    try {
      var dataURL = canvas.toDataURL('image/jpeg');
      saveButton.href = dataURL;
      var d = new Date();
      saveButton.download = d.getFullYear() + ("0"+(d.getMonth()+1)).slice(-2) + ("0" + d.getDate()).slice(-2) + ("0" + d.getHours()).slice(-2) + ("0" + d.getMinutes()).slice(-2) + ("0" + d.getSeconds()).slice(-2) + ".jpg";
    } catch (e) {
      console.error(e);
    }
    canvas.parentNode.removeChild(canvas);
  }

  // Attach default on change action
  document
    .querySelectorAll('.default-action')
    .forEach(el => {
      el.onchange = () => updateConfig(el)
    })

  // Custom actions
  // Gain
  const agc = document.getElementById('agc')
  const agcGain = document.getElementById('agc_gain-group')
  const gainCeiling = document.getElementById('gainceiling-group')
  agc.onchange = () => {
    updateConfig(agc)
    if (agc.checked) {
      show(gainCeiling)
      hide(agcGain)
    } else {
      hide(gainCeiling)
      show(agcGain)
    }
  }
  // Exposure
  const aec = document.getElementById('aec')
  const exposure = document.getElementById('aec_value-group')
  aec.onchange = () => {
    updateConfig(aec)
    aec.checked ? hide(exposure) : show(exposure)
  }
  // Detection and framesize
  const framesize = document.getElementById('framesize')
  framesize.onchange = () => {
    updateConfig(framesize)
  }
})

</script>
</body>
</html>
